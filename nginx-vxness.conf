# Nginx Configuration for vxness.com with Subdomains
# Save this file to /etc/nginx/sites-available/vxness on your VPS

# Redirect HTTP to HTTPS for all domains
server {
    listen 80;
    server_name vxness.com www.vxness.com trade.vxness.com admin.vxness.com api.vxness.com;
    return 301 https://$server_name$request_uri;
}

# Main Landing Page - vxness.com & www.vxness.com
server {
    listen 443 ssl http2;
    server_name vxness.com www.vxness.com;

    # Cloudflare Origin Certificate
    ssl_certificate /etc/ssl/cloudflare/vxness.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/vxness.com.key;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend files
    root /home/vxness/vxness/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}

